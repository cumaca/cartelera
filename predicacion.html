<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grupos - La Cumaca</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="header-principal">
        <div class="header-contenedor">
            <a href="index.html" class="btn-back">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </a>
            <h1>Grupos de Predicación</h1>
        </div>
    </header>

    <div class="container">
        <div id="global-error" class="hidden"></div>
        
        <div class="segmented-control">
            <div class="seg-btn active" onclick="switchTab('hoy')">Grupo de hoy</div>
            <div class="seg-btn" onclick="switchTab('buscar')">Buscar grupos</div>
        </div>

        <div id="tab-hoy" class="tab-content active">
            <div id="grupo-hoy-unico-content">
                <div class="inline-loader"><div class="spinner"></div><p>Buscando grupo de hoy...</p></div>
            </div>
        </div>

        <div id="tab-buscar" class="tab-content">
            <div class="card" style="margin-bottom: 10px;">
                <div id="month-indicator" class="month-indicator">...</div>
                
                <div class="carousel-wrapper">
                    <button id="btn-today" class="btn-today-floating" onclick="goToToday()">Ir a Hoy</button>
                    <div class="carousel-arrow carousel-arrow-left" onclick="scrollCarousel(-1)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
                    </div>
                    <div class="carousel-arrow carousel-arrow-right" onclick="scrollCarousel(1)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
                    </div>
                    <div class="carousel" id="carousel"></div>
                </div>

                <div class="calendar-toggle-wrapper">
                    <button class="calendar-toggle" onclick="toggleSection('calendario')">
                        <svg id="cal-toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg>
                        <span id="calendar-toggle-text">Mostrar calendario</span>
                    </button>
                </div>
                
                <div class="section-content" id="calendario-content">
                    <div class="section-inner">
                        <div class="calendar-header">
                            <div class="calendar-nav-btn" onclick="navMes(-1)">❮</div>
                            <div class="calendar-month" id="calendar-month"></div>
                            <div class="calendar-nav-btn" onclick="navMes(1)">❯</div>
                        </div>
                        <div class="calendar-grid" id="calendario-grid"></div>
                    </div>
                </div>
                
                <div id="swipe-grupos-hoy" class="grupos-dia-container">
                    <div id="grupos-dia-content">
                        <div class="inline-loader"><div class="spinner"></div><p>Cargando grupos...</p></div>
                    </div>
                </div>

                <div class="ver-todos-wrapper">
                    <button class="ver-todos-btn" id="ver-todos-btn" onclick="toggleSection('todos-grupos')">
                        <span id="ver-todos-text">Ver todos los grupos</span>
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                    </button>
                </div>
                
                <div class="section-content" id="todos-grupos-content">
                    <div class="section-inner">
                        <div id="swipe-timeline" class="timeline-wrapper"></div>
                        <div id="paginacion-container" class="pagination-container hidden"></div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div class="nav-segment-container">
        <div class="nav-segment">
            <a href="index.html" class="nav-btn">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                Inicio
            </a>
            <a href="predicacion.html" class="nav-btn activo">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                Grupos
            </a>
            <a href="reuniones.html" class="nav-btn">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                Reuniones
            </a>
            <a href="anuncios.html" class="nav-btn">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                Anuncios
            </a>
        </div>
    </div>

    <script>
        let dbGrupos = [];
        let fechaHoy = new Date();
        let fechaSeleccionada = new Date(fechaHoy);
        let fechaVisualizadaCalendario = new Date(fechaHoy);
        let sectionsExpanded = {};
        let paginaGruposActual = 1;
        const diasPorPagina = 3; 

        function toISODate(d) {
            if(!(d instanceof Date)) return "";
            return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
        }

        async function iniciarApp() {
            try {
                const timestamp = new Date().getTime();
                const response = await fetch('./data/cartelera_datos.json?t=' + timestamp);
                if (!response.ok) throw new Error("Error HTTP: " + response.status);
                const dataRaw = await response.json();
                
                const rawGrupos = dataRaw.grupos || [];
                let gruposAgrupados = {};
                
                rawGrupos.forEach(item => {
                    let f = item.Fecha || item.fecha || "";
                    f = f.substring(0, 10); 
                    if (!f) return;
                    if (!gruposAgrupados[f]) gruposAgrupados[f] = { fecha: f, grupos: [] };
                    
                    gruposAgrupados[f].grupos.push({
                        hora: item.Hora || item.hora || "",
                        territorio: item.Territorio || item.territorio || "",
                        conductor: item.Conductor || item.conductor || "",
                        lugar: item.Lugar_Grupos || item.lugar_grupos || item.gruposassigned || "",
                        mapa: item.Mapa || item.mapa || ""
                    });
                });
                
                dbGrupos = Object.values(gruposAgrupados);
                dbGrupos.sort((a, b) => a.fecha.localeCompare(b.fecha));
                
                renderGrupoHoyUnico(); // Carga la pestaña de hoy por defecto
                renderAll(); // Pre-carga el calendario de buscar
                setTimeout(() => goToToday(), 100);

            } catch (error) {
                document.getElementById('global-error').textContent = "Problema al cargar datos: " + error.message;
                document.getElementById('global-error').classList.remove('hidden');
            }
        }

        // FUNCIÓN PARA CAMBIAR ENTRE PESTAÑAS
        function switchTab(tabId) {
            document.querySelectorAll('.seg-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            
            if (tabId === 'hoy') {
                document.querySelectorAll('.seg-btn')[0].classList.add('active');
                document.getElementById('tab-hoy').classList.add('active');
            } else {
                document.querySelectorAll('.seg-btn')[1].classList.add('active');
                document.getElementById('tab-buscar').classList.add('active');
            }
        }

        // FUNCIÓN EXCLUSIVA PARA LA PESTAÑA "GRUPO DE HOY"
        function renderGrupoHoyUnico() {
            const container = document.getElementById('grupo-hoy-unico-content');
            const hoyStr = toISODate(new Date()); 
            const data = dbGrupos.find(g => g.fecha === hoyStr);
            
            if (!data || !data.grupos || data.grupos.length === 0) { 
                container.innerHTML = `
                <div class="card" style="padding: 40px 20px; text-align: center; margin-bottom: 0;">
                    <svg width="40" height="40" style="color:#9ca3af; margin: 0 auto 10px auto; display: block;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <div style="color:#6b7280; font-size:14px; font-weight:500;">No hay grupos programados para hoy.</div>
                </div>`; 
                return; 
            }
            
            let htmlInner = '';
            data.grupos.forEach(g => {
                const mapaHtml = g.mapa ? `<a href="${g.mapa}" target="_blank" style="text-decoration:none; color:#4A6DA7; font-size: 13px; font-weight:800; margin-left: 6px;">📍 Ver mapa</a>` : '';
                htmlInner += `<div class="grupo-item-hoy"><div class="grupo-row-flex"><div class="gh-hora-hoy" style="color:#4A6DA7; border-color:#4A6DA7; background:#f4f6fa;">${g.hora}</div><div class="grupo-content-col"><div class="gh-top-row"><div class="gh-territorio">${g.territorio}</div><div class="gh-conductor">${g.conductor}</div></div>${g.lugar ? `<div class="gh-asignados">${g.lugar}${mapaHtml}</div>` : (mapaHtml ? `<div class="gh-asignados">${mapaHtml}</div>` : '')}</div></div></div>`;
            });
            
            const diaSemana = new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
            
            container.innerHTML = `
            <div class="card" style="margin-bottom: 0;">
                <div class="grupo-consolidado-card" style="border: none; background: transparent;">
                    <div class="grupo-consolidado-header" style="color: #4A6DA7;">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg> 
                        Grupo de Hoy • <span style="text-transform: capitalize;">${diaSemana}</span>
                    </div>
                    ${htmlInner}
                </div>
            </div>`;
        }


        // Funciones del calendario y carrusel de la Pestaña Buscar
        function renderAll() {
            const d = new Date(fechaSeleccionada.getTime());
            document.getElementById('month-indicator').textContent = d.toLocaleDateString('es-ES', {month:'long', year:'numeric'});
            
            const btnToday = document.getElementById('btn-today');
            btnToday.style.display = esMismoDia(fechaSeleccionada, fechaHoy) ? 'none' : 'flex'; 
            
            renderCalendarGrid(); renderCarousel(); renderGruposDia(); renderTodosGruposPaginados();
        }

        function esMismoDia(f1, f2) { const str1 = f1 instanceof Date ? toISODate(f1) : f1; const str2 = f2 instanceof Date ? toISODate(f2) : f2; return str1 === str2; }
        function scrollCarousel(d) { document.getElementById('carousel').scrollBy({ left: d * 120, behavior: 'smooth' }); }
        function goToToday() { fechaSeleccionada = new Date(fechaHoy); renderAll(); const c = document.getElementById('carousel'); setTimeout(() => { const s = c.querySelector('.is-today'); if(s) s.scrollIntoView({ block: 'nearest', inline: 'center', behavior: 'smooth' }); }, 100); }
        function navMes(d) { fechaVisualizadaCalendario.setMonth(fechaVisualizadaCalendario.getMonth() + d); renderCalendarGrid(); }

        function renderGruposDia() {
            const container = document.getElementById('grupos-dia-content');
            const fechaStr = toISODate(fechaSeleccionada);
            const data = dbGrupos.find(g => g.fecha === fechaStr);
            if (!data || !data.grupos || data.grupos.length === 0) { container.innerHTML = `<div class="no-grupos">No hay grupos programados para esta fecha.</div>`; return; }
            let htmlInner = '';
            
            data.grupos.forEach(g => {
                const mapaHtml = g.mapa ? `<a href="${g.mapa}" target="_blank" style="text-decoration:none; color:#4A6DA7; font-size: 13px; font-weight:800; margin-left: 6px;">📍 Ver mapa</a>` : '';
                htmlInner += `<div class="grupo-item-hoy"><div class="grupo-row-flex"><div class="gh-hora-hoy">${g.hora}</div><div class="grupo-content-col"><div class="gh-top-row"><div class="gh-territorio">${g.territorio}</div><div class="gh-conductor">${g.conductor}</div></div>${g.lugar ? `<div class="gh-asignados">${g.lugar}${mapaHtml}</div>` : (mapaHtml ? `<div class="gh-asignados">${mapaHtml}</div>` : '')}</div></div></div>`;
            });
            const diaSemana = fechaSeleccionada.toLocaleDateString('es-ES', { weekday: 'long' });
            container.innerHTML = `<div class="grupo-consolidado-card"><div class="grupo-consolidado-header"><svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>Grupos del ${diaSemana}</div>${htmlInner}</div>`;
        }

        function renderCalendarGrid() { 
            document.getElementById('calendar-month').textContent = fechaVisualizadaCalendario.toLocaleDateString('es-ES', {month:'long', year:'numeric'}); 
            const grid = document.getElementById('calendario-grid'); grid.innerHTML=''; 
            ['D','L','M','M','J','V','S'].forEach(d=>grid.innerHTML+=`<div class="calendar-day-header">${d}</div>`); 
            const first = new Date(fechaVisualizadaCalendario.getFullYear(), fechaVisualizadaCalendario.getMonth(), 1); 
            const days = new Date(fechaVisualizadaCalendario.getFullYear(), fechaVisualizadaCalendario.getMonth()+1, 0).getDate(); 
            for(let i=0; i<first.getDay(); i++) grid.innerHTML+=`<div></div>`; 
            for(let i=1; i<=days; i++) { 
                let d = document.createElement('div'); d.className='calendar-day'; d.textContent=i; 
                const fStr = `${fechaVisualizadaCalendario.getFullYear()}-${String(fechaVisualizadaCalendario.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`; 
                if(fStr === toISODate(fechaSeleccionada)) d.classList.add('selected'); 
                if(fStr === toISODate(fechaHoy)) d.classList.add('today'); 
                d.onclick=()=>{ fechaVisualizadaCalendario.setMonth(fechaVisualizadaCalendario.getMonth()); fechaSeleccionada = new Date(fechaVisualizadaCalendario.getFullYear(), fechaVisualizadaCalendario.getMonth(), i); if (sectionsExpanded['calendario']) { toggleSection('calendario'); } renderAll(); }; 
                grid.appendChild(d); 
            } 
        }

        function renderCarousel() { const c = document.getElementById('carousel'); c.innerHTML = ''; const b = new Date(fechaHoy); let startBase = b; if (fechaSeleccionada > new Date(b.getTime() + (60*86400000)) || fechaSeleccionada < new Date(b.getTime() - (10*86400000))) { startBase = new Date(fechaSeleccionada); } for(let i=-2; i<=60; i++) { const f = new Date(startBase); f.setDate(startBase.getDate() + i); const card = document.createElement('div'); card.dataset.date = toISODate(f); card.className = `date-card ${esMismoDia(f, fechaSeleccionada) ? 'selected' : ''} ${esMismoDia(f, fechaHoy) ? 'is-today' : ''}`; card.innerHTML = `<div class="date-card-day">${f.toLocaleDateString('es-ES',{weekday:'short'}).slice(0,3)}</div><div class="date-card-number">${f.getDate()}</div>`; card.onclick = () => { fechaSeleccionada = f; renderAll(); }; c.appendChild(card); } }

        function renderTodosGruposPaginados() { const tl = document.getElementById('swipe-timeline'); const pagContainer = document.getElementById('paginacion-container'); tl.innerHTML = ''; pagContainer.innerHTML = ''; const hoyStr = toISODate(fechaHoy); let listaFechas = dbGrupos.filter(g => g.fecha >= hoyStr); listaFechas.sort((a, b) => new Date(a.fecha) - new Date(b.fecha)); if (listaFechas.length === 0) { tl.innerHTML = '<div class="no-grupos">No hay grupos futuros programados.</div>'; pagContainer.classList.add('hidden'); return; } const totalPaginas = Math.ceil(listaFechas.length / diasPorPagina); if (paginaGruposActual > totalPaginas) paginaGruposActual = 1; const inicio = (paginaGruposActual - 1) * diasPorPagina; const fechasPagina = listaFechas.slice(inicio, inicio + diasPorPagina); fechasPagina.forEach(diaData => { const parts = diaData.fecha.split('-'); const d = new Date(parts[0], parts[1]-1, parts[2]); const fechaNice = d.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }); const dayBlock = document.createElement('div'); dayBlock.className = 'timeline-day-block'; if (esMismoDia(diaData.fecha, fechaSeleccionada)) dayBlock.classList.add('active-day'); const header = document.createElement('div'); header.className = 'timeline-date-header'; header.textContent = fechaNice; dayBlock.appendChild(header); diaData.grupos.forEach(g => { const mapaHtml = g.mapa ? `<a href="${g.mapa}" target="_blank" style="text-decoration:none; color:#4A6DA7; font-size: 13px; font-weight:800; margin-left: 6px;">📍 Ver mapa</a>` : ''; const row = document.createElement('div'); row.className = 'timeline-row'; row.innerHTML = `<div class="grupo-row-flex"><div class="gh-hora-timeline">${g.hora}</div><div class="grupo-content-col"><div class="gh-top-row"><div class="gh-territorio">${g.territorio}</div><div class="gh-conductor">${g.conductor}</div></div>${g.lugar ? `<div class="gh-asignados">${g.lugar}${mapaHtml}</div>` : (mapaHtml ? `<div class="gh-asignados">${mapaHtml}</div>` : '')}</div></div>`; dayBlock.appendChild(row); }); tl.appendChild(dayBlock); }); if (totalPaginas > 1) { pagContainer.classList.remove('hidden'); const btnPrev = document.createElement('button'); btnPrev.className = 'page-btn'; btnPrev.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>'; btnPrev.disabled = paginaGruposActual === 1; btnPrev.onclick = () => { paginaGruposActual--; renderTodosGruposPaginados(); }; pagContainer.appendChild(btnPrev); for (let i = 1; i <= totalPaginas; i++) { const btn = document.createElement('button'); btn.className = `page-btn ${i === paginaGruposActual ? 'active' : ''}`; btn.textContent = i; btn.onclick = () => { paginaGruposActual = i; renderTodosGruposPaginados(); }; pagContainer.appendChild(btn); } const btnNext = document.createElement('button'); btnNext.className = 'page-btn'; btnNext.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>'; btnNext.disabled = paginaGruposActual === totalPaginas; btnNext.onclick = () => { paginaGruposActual++; renderTodosGruposPaginados(); }; pagContainer.appendChild(btnNext); } else { pagContainer.classList.add('hidden'); } }

        function toggleSection(id) { 
            const c = document.getElementById(id + '-content'); 
            sectionsExpanded[id] = !sectionsExpanded[id]; 
            c.classList.toggle('expanded'); 
            if(id === 'todos-grupos') { 
                const btnText = document.getElementById('ver-todos-text'); const btn = document.getElementById('ver-todos-btn'); 
                if (sectionsExpanded[id]) { btnText.textContent = "Ocultar grupos"; btn.classList.add('expanded'); paginaGruposActual = 1; renderTodosGruposPaginados(); } else { btnText.textContent = "Ver todos los grupos"; btn.classList.remove('expanded'); } 
            } 
        }

        iniciarApp();
    </script>
</body>
</html>
