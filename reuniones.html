<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reuniones - La Cumaca</title>
    <link rel="stylesheet" href="styles.css?v=8.0">
</head>
<body>

    <header class="header-principal">
        <div class="header-contenedor">
            <a href="index.html" class="btn-back">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </a>
            <h1>Programa de Reuniones</h1>
        </div>
    </header>

    <div class="container">
        <div id="global-error" class="hidden"></div>

        <div class="reunion-week-nav" style="margin-top: 10px;">
            <div class="week-nav-arrow" onclick="cambiarSemana(-1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg></div>
            <div class="week-nav-text" onclick="resetearSemana()">Esta Semana</div>
            <div class="week-nav-arrow" onclick="cambiarSemana(1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg></div>
        </div>

        <div class="segmented-control" id="tab-nav-main" style="margin: 0 0 16px 0;">
            <div class="seg-btn" id="btn-tab-semana" onclick="switchReunionTab('semana')"><span style="font-size: 11px; font-weight: 500;">Reunión</span><br>Entre Semana</div>
            <div class="seg-btn" id="btn-tab-finde" onclick="switchReunionTab('finde')"><span style="font-size: 11px; font-weight: 500;">Reunión</span><br>Fin de Semana</div>
        </div>

        <div class="card" id="reuniones-swipe-wrapper" style="margin-top: 0;">
            <div id="tab-semana" class="tab-content">
                <div class="section-inner wol-style" id="reunion-semana-detalle">
                    <div class="inline-loader"><div class="spinner"></div><p>Cargando programa...</p></div>
                </div>
            </div>
            <div id="tab-finde" class="tab-content">
                <div class="section-inner wol-style" id="reunion-finde-detalle">
                    <div class="inline-loader"><div class="spinner"></div><p>Cargando programa...</p></div>
                </div>
            </div>
        </div>
    </div>

    <div class="nav-segment-container">
        <div class="nav-segment">
            <a href="index.html" class="nav-btn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg> Inicio</a>
            <a href="predicacion.html" class="nav-btn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg> Grupos</a>
            <a href="reuniones.html" class="nav-btn activo"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg> Reuniones</a>
            <a href="anuncios.html" class="nav-btn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg> Anuncios</a>
        </div>
    </div>

    <script>
        let dbVidaMinisterio = [], dbFinSemana = [];
        let fechaHoy = new Date();
        let semanaOffset = 0;
        let currentRoomFilter = 'todo'; 

        function toISODate(d) {
            if(!(d instanceof Date)) return "";
            return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
        }

        // LÓGICA DE URL: Guarda el estado para cuando compartes el link
        function updateURL() {
            const currentTab = document.getElementById('btn-tab-semana').classList.contains('active') ? 'semana' : 'finde';
            const newUrl = window.location.pathname + '?s=' + semanaOffset + '&t=' + currentTab;
            window.history.replaceState(null, '', newUrl);
        }

        async function iniciarApp() {
            try {
                // Leer parámetros de la URL al entrar
                const urlParams = new URLSearchParams(window.location.search);
                if(urlParams.has('s')) {
                    semanaOffset = parseInt(urlParams.get('s')) || 0;
                }

                const timestamp = new Date().getTime();
                const response = await fetch('./data/cartelera_datos.json?t=' + timestamp);
                if (!response.ok) throw new Error("Error HTTP: " + response.status);
                const dataRaw = await response.json();
                
                dbVidaMinisterio = dataRaw.vidaMinisterio || [];
                dbFinSemana = dataRaw.finSemana || [];
                
                // Si la URL traía una pestaña guardada la usamos, si no, calculamos por día
                let initialTab = urlParams.get('t');
                if(!initialTab) {
                    const todayDay = fechaHoy.getDay();
                    initialTab = (todayDay === 0 || todayDay === 6) ? 'finde' : 'semana';
                }
                
                switchReunionTab(initialTab, false); // false para no actualizar URL aquí
                renderReuniones();
                setupSwipe('reuniones-swipe-wrapper', () => cambiarSemana(1), () => cambiarSemana(-1));
            } catch (error) {
                document.getElementById('global-error').textContent = "Problema al cargar datos: " + error.message;
                document.getElementById('global-error').classList.remove('hidden');
                document.querySelectorAll('.inline-loader').forEach(el => el.innerHTML = '<p>Error al cargar.</p>');
            }
        }

        function switchReunionTab(tab, triggerUrlUpdate = true) {
            document.querySelectorAll('#tab-nav-main .seg-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            if(tab === 'semana') {
                document.getElementById('btn-tab-semana').classList.add('active');
                document.getElementById('tab-semana').classList.add('active');
            } else {
                document.getElementById('btn-tab-finde').classList.add('active');
                document.getElementById('tab-finde').classList.add('active');
            }
            if(triggerUrlUpdate) updateURL();
        }

        function setRoomFilter(filter) { currentRoomFilter = filter; renderReuniones(); }

        function renderReuniones() {
            const d = new Date(fechaHoy); const day = d.getDay(); 
            const diff = d.getDate() - day + (day == 0 ? -6 : 1) + (semanaOffset * 7);
            const lunes = new Date(d.setDate(diff)); const lunesStr = toISODate(lunes);
            const domingo = new Date(lunes); domingo.setDate(lunes.getDate() + 6); const domingoStr = toISODate(domingo);
            
            const mNombres = ["ene", "feb", "mar", "abr", "may", "jun", "jul", "ago", "sep", "oct", "nov", "dic"];
            const rangoTextoStr = `${lunes.getDate()} ${mNombres[lunes.getMonth()].toUpperCase()} - ${domingo.getDate()} ${mNombres[domingo.getMonth()].toUpperCase()}`;

            const buscar = (lista) => lista.find(r => r.fecha >= lunesStr && r.fecha <= domingoStr);
            const dataSemana = buscar(dbVidaMinisterio); const dataFinde = buscar(dbFinSemana);

            const containerSemana = document.getElementById('reunion-semana-detalle');
            
            // --- REUNIÓN ENTRE SEMANA ---
            if (dataSemana) {
                const fPartsMid = dataSemana.fecha.split('-');
                const dMid = new Date(fPartsMid[0], fPartsMid[1]-1, fPartsMid[2]);
                const dayName = dMid.toLocaleDateString('es-ES', { weekday: 'long' });
                const fechaEleganteStr = `${dayName.charAt(0).toUpperCase() + dayName.slice(1)} ${dMid.getDate()} de ${mNombres[dMid.getMonth()]}`;
                
                let html = `
                <div class="reunion-date-box">
                    <div style="font-size: 13px; font-weight: 800; color: #9ca3af; text-transform: uppercase;">${rangoTextoStr}</div>
                    <div style="font-size: 17px; font-weight: 800; color: #4A6DA7; margin-top: 4px;">${fechaEleganteStr} - 6:30 PM</div>
                </div>

                <div class="header-roles" style="margin-bottom: 16px; padding-left: 8px;">
                    <div class="header-role-row"><span class="hr-label">Presidente:</span> <strong>${dataSemana.presidente || "-"}</strong></div>
                    <div class="header-role-row"><span class="hr-label">Oración inicial:</span> <strong>${dataSemana.oracionInicial || "-"}</strong></div>
                </div>
                
                <div class="reunion-filter-container">
                    <div class="segmented-control filter-control" style="margin: 0;">
                        <div class="seg-btn ${currentRoomFilter === 'todo' ? 'active' : ''}" onclick="setRoomFilter('todo')">Mostrar Todo</div>
                        <div class="seg-btn ${currentRoomFilter === 'principal' ? 'active' : ''}" onclick="setRoomFilter('principal')">Sala Principal</div>
                        <div class="seg-btn ${currentRoomFilter === 'segunda' ? 'active' : ''}" onclick="setRoomFilter('segunda')">2da Sala</div>
                    </div>
                </div>`;

                html += `<div class="c-tesoros"><div class="sect-header">TESOROS DE LA BIBLIA</div><div class="timeline-group">`;
                html += renderFlexItem('Introducción', dataSemana.tesoros_introduccion_tiempo, formatBold(dataSemana.tesoros_introduccion_hermano), 'c-tesoros');
                html += renderFlexItem(dataSemana.tesoros_parte1_titulo, dataSemana.tesoros_parte1_tiempo, formatBold(dataSemana.tesoros_parte1_principal), 'c-tesoros');
                html += renderFlexItem(dataSemana.tesoros_parte2_titulo, dataSemana.tesoros_parte2_tiempo, formatBold(dataSemana.tesoros_parte2_principal), 'c-tesoros');
                
                if (currentRoomFilter === 'segunda') {
                    html += `<button class="inline-toggle-box" onclick="setRoomFilter('todo')">Mostrar Sala Principal <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg></button>`;
                }

                if (currentRoomFilter === 'todo' || currentRoomFilter === 'principal') {
                    html += renderFlexItem('Lectura de la Biblia: ' + (dataSemana.tesoros_lectura_textos || ''), dataSemana.tesoros_lectura_tiempo, formatBold(dataSemana.tesoros_lectura_estudiante), 'c-tesoros');
                    if (currentRoomFilter === 'principal' && dataSemana.tesoros_lectura_segundaSala) {
                        html += `<button class="inline-toggle-box" onclick="setRoomFilter('todo')">Mostrar Segunda Sala <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg></button>`;
                    }
                }
                html += `</div>`; 

                // Lectura de la biblia (segunda sala): AHORA PASA SU VARIABLE DE TIEMPO
                if (dataSemana.tesoros_lectura_segundaSala && (currentRoomFilter === 'todo' || currentRoomFilter === 'segunda')) {
                    html += `<div class="sr-full-section"><div class="sect-subtitle">SEGUNDA SALA</div><div class="sr-conductor">Conductor: <strong>${dataSemana.maestros_salaAuxiliar || '-'}</strong></div><div class="timeline-group">`;
                    html += renderFlexItem('Lectura de la Biblia', dataSemana.tesoros_lectura_tiempo, formatBold(dataSemana.tesoros_lectura_segundaSala), 'c-tesoros', true);
                    html += `</div></div>`;
                }
                html += `</div>`;

                let mainParts = [], secondParts = [];
                for(let i=1; i<=5; i++) { 
                    if(dataSemana[`maestros_parte${i}_titulo`]) { 
                        mainParts.push(renderFlexItem(dataSemana[`maestros_parte${i}_titulo`], dataSemana[`maestros_parte${i}_tiempo`], formatHelper(dataSemana[`maestros_parte${i}_principal`], dataSemana[`maestros_parte${i}_ayudante`]), 'c-maestros')); 
                        if(dataSemana[`maestros_parte${i}_segundaSala_principal`]) { 
                            secondParts.push(renderFlexItem(dataSemana[`maestros_parte${i}_titulo`], dataSemana[`maestros_parte${i}_tiempo`], formatHelper(dataSemana[`maestros_parte${i}_segundaSala_principal`], dataSemana[`maestros_parte${i}_segundaSala_ayudante`]), 'c-maestros'));
                        } 
                    } 
                }

                html += `<div class="c-maestros"><div class="sect-header">SEAMOS MEJORES MAESTROS</div>`;
                if (currentRoomFilter === 'todo' || currentRoomFilter === 'principal') { html += `<div class="sect-subtitle">SALA PRINCIPAL</div><div class="timeline-group">${mainParts.join('')}</div>`; }
                if (secondParts.length > 0 && (currentRoomFilter === 'todo' || currentRoomFilter === 'segunda')) { html += `<div class="sr-full-section"><div class="sect-subtitle">SEGUNDA SALA</div><div class="sr-conductor">Conductor: <strong>${dataSemana.maestros_salaAuxiliar || '-'}</strong></div><div class="timeline-group">${secondParts.join('')}</div></div>`; }
                html += `</div>`;
                
                html += `<div class="c-vida"><div class="sect-header">NUESTRA VIDA CRISTIANA</div><div class="timeline-group">${renderFlexItem(dataSemana.vida_parte1_titulo, dataSemana.vida_parte1_tiempo, formatBold(dataSemana.vida_parte1_hermano), 'c-vida')}${renderFlexItem('Estudio bíblico', dataSemana.vida_estudioBiblico_tiempo, `Conductor: <strong>${dataSemana.vida_estudioBiblico_conductor}</strong><br>Lector: <strong>${dataSemana.vida_estudioBiblico_lector}</strong>`, 'c-vida')}${renderFlexItem('Palabras de conclusión', dataSemana.vida_conclusion_tiempo, formatBold(dataSemana.vida_conclusion_hermano), 'c-vida')}</div></div><div style="margin-top: 4px; padding-top:4px; border-top:1px solid #f3f4f6; padding-left:10px;"><div class="header-role-row"><span class="hr-label">Oración final:</span> <strong>${dataSemana.oracionFinal || "-"}</strong></div></div>`;
                
                html += renderAssignmentsGrid(dataSemana, 'entreSemana');
                containerSemana.innerHTML = html;

            } else {
                containerSemana.innerHTML = `<div class="reunion-date-box"><div style="font-size: 13px; font-weight: 800; color: #9ca3af; text-transform: uppercase;">${rangoTextoStr}</div></div><div class="no-grupos">Sin programación cargada para esta semana.</div>`;
            }

            // --- REUNIÓN FIN DE SEMANA ---
            const containerFinde = document.getElementById('reunion-finde-detalle');
            if (dataFinde) {
                const fPartsMid = dataFinde.fecha.split('-');
                const dMid = new Date(fPartsMid[0], fPartsMid[1]-1, fPartsMid[2]);
                const dayName = dMid.toLocaleDateString('es-ES', { weekday: 'long' });
                const fechaEleganteStr = `${dayName.charAt(0).toUpperCase() + dayName.slice(1)} ${dMid.getDate()} de ${mNombres[dMid.getMonth()]}`;
                
                let html = `
                <div class="reunion-date-box">
                    <div style="font-size: 13px; font-weight: 800; color: #9ca3af; text-transform: uppercase;">${rangoTextoStr}</div>
                    <div style="font-size: 17px; font-weight: 800; color: #4A6DA7; margin-top: 4px;">${fechaEleganteStr} - 10:00 AM</div>
                </div>

                <div class="header-roles" style="margin-bottom: 24px;">
                    <div class="header-role-row"><span class="hr-label">Presidente:</span> <strong>${dataFinde.presidente || "-"}</strong></div>
                    <div class="header-role-row"><span class="hr-label">Oración inicial:</span> <strong>${dataFinde.oracionInicial || "-"}</strong></div>
                </div>`;
                
                // Parámetro TRUE para ocultar líneas verticales
                html += `<div class="c-publico"><div class="sect-header">DISCURSO PÚBLICO</div><div class="timeline-group">${renderFlexItem(`"${dataFinde.discursoPublico_tema}"`, '', `<strong>${dataFinde.discursoPublico_orador}</strong><br><span style="font-size:14px; color:#6b7280;">${dataFinde.discursoPublico_congregacion}</span>`, 'c-publico', true)}</div></div>`;
                html += `<div class="c-publico"><div class="sect-header">ESTUDIO DE LA ATALAYA</div><div class="timeline-group">${renderFlexItem(dataFinde.estudioAtalaya_articulo, '', `Conductor: <strong>${dataFinde.estudioAtalaya_conductor}</strong><br>Lector: <strong>${dataFinde.estudioAtalaya_lector}</strong>`, 'c-publico', true)}</div></div><div style="margin-top: 4px; padding-top:4px; border-top:1px solid #f3f4f6; padding-left:10px;"><div class="header-role-row"><span class="hr-label">Oración final:</span> <strong>${dataFinde.oracionFinal || "-"}</strong></div></div>`;
                
                html += renderAssignmentsGrid(dataFinde, 'finSemana');
                containerFinde.innerHTML = html;
            } else {
                containerFinde.innerHTML = `<div class="reunion-date-box"><div style="font-size: 13px; font-weight: 800; color: #9ca3af; text-transform: uppercase;">${rangoTextoStr}</div></div><div class="no-grupos">Sin programación para este fin de semana.</div>`;
            }
        }

        function renderFlexItem(title, time, who, parentClass, hideLine = false) { 
            if(!title) return ''; 
            return `<div class="rt-row ${parentClass} ${hideLine ? 'no-line' : ''}"><div class="rt-time-col"></div><div class="rt-line-col"><div class="rt-line"></div><div class="rt-dot"></div></div><div class="rt-content-col"><div class="rt-title">${time ? `<span class="rt-time-tag">${time}</span>` : ''}${title}</div>${who ? `<div class="rt-who">${who}</div>` : ''}</div></div>`; 
        }
        function formatHelper(p, a) { return !p ? '' : (a ? `<strong>${p}</strong><div style="color:#6b7280; font-size:14px;">${a} (Ayudante)</div>` : `<strong>${p}</strong>`); }
        function formatBold(text) { return text ? `<strong>${text}</strong>` : ''; }

        // --- ASIGNACIONES CON VIÑETAS (Bullet points) ---
        function renderAssignmentsGrid(data, type) {
            let list = '', highlights = '';
            
            const addGridItem = (label, value) => { 
                if(!value) return ''; 
                let names = value.split(/,| y | Y /).map(n => n.trim()).filter(n => n);
                let isEncargado = label.includes('Encargado');
                let colorStyle = isEncargado ? 'color: #4A6FAA;' : 'color: #4B5563;';
                let valColorStyle = isEncargado ? 'color: #4A6FAA;' : 'color: #6b7280;';
                
                let nHtml = names.map(n => `<div class="svc-bullet-item" style="${valColorStyle}; font-weight: 500;">
                    <span style="margin-right: 6px; font-size: 18px; line-height: 1;">&bull;</span>${n}
                </div>`).join(''); 
                
                return `<div class="svc-block"><div class="svc-block-title" style="${colorStyle}">${label}</div>${nHtml}</div>`; 
            };
            
            if (type === 'entreSemana') {
                if(data.limpiezaSuperficial) highlights += `<div class="highlight-midweek"><span class="highlight-label">Limpieza Superficial</span><span class="highlight-val">Grupo ${data.limpiezaSuperficial}</span></div>`;
                list = `<div class="svc-grid" style="margin-top:16px;">${addGridItem('Encargado', data.encargado)}${addGridItem('Auditorio', `${data.acomodadorAuditorio1}, ${data.acomodadorAuditorio2}`)}${addGridItem('Puerta', data.acomodadorPuerta)}${addGridItem('Micrófonos', `${data.microfonos1}, ${data.microfonos2}`)}${addGridItem('Audio/Video', `${data.audioVideo1}, ${data.audioVideo2}`)}${addGridItem('Plataforma', data.plataforma)}</div>`;
            } else if (type === 'finSemana') {
                if(data.limpiezaAFondo || data.hospitalidad) {
                    highlights += `<div class="highlight-weekend-box">`;
                    if(data.limpiezaAFondo) highlights += `<div class="hw-item"><span class="highlight-label">Limpieza Profunda</span><span class="highlight-val">Grupo ${data.limpiezaAFondo}</span></div>`;
                    if(data.limpiezaAFondo && data.hospitalidad) highlights += `<div class="hw-divider"></div>`;
                    if(data.hospitalidad) highlights += `<div class="hw-item"><span class="highlight-label">Hospitalidad</span><span class="highlight-val">Grupo ${data.hospitalidad}</span></div>`;
                    highlights += `</div>`;
                }
                list = `<div class="svc-grid">${addGridItem('Encargado', data.encargado)}${addGridItem('Auditorio', `${data.acomodadorAuditorio1}, ${data.acomodadorAuditorio2}`)}${addGridItem('Puerta', data.acomodadorPuerta)}${addGridItem('Micrófonos', `${data.microfonos1}, ${data.microfonos2}`)}${addGridItem('Audio/Video', `${data.audioVideo1}, ${data.audioVideo2}`)}${addGridItem('Plataforma', data.plataforma)}</div>`;
            }
            if(!list && !highlights) return '';
            return `${highlights}<div class="svc-container"><div class="svc-title-main">ASIGNACIONES</div>${list}</div>`;
        }

        // LÓGICA DE SWIPE (DESLIZAR)
        function setupSwipe(elementId, onSwipeLeft, onSwipeRight) { 
            const element = document.getElementById(elementId); 
            if (!element) return; 
            let touchStartX = 0; let touchStartY = 0; 
            element.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; touchStartY = e.changedTouches[0].screenY; }, {passive: true}); 
            element.addEventListener('touchend', e => { 
                const diffX = touchStartX - e.changedTouches[0].screenX; 
                const diffY = touchStartY - e.changedTouches[0].screenY; 
                if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) { 
                    if (diffX > 0) onSwipeLeft(); else onSwipeRight(); 
                } 
            }, {passive: true}); 
        }

        function cambiarSemana(d) { semanaOffset += d; updateURL(); renderReuniones(); }
        function resetearSemana() { semanaOffset = 0; updateURL(); renderReuniones(); }

        iniciarApp();
    </script>
</body>
</html>
